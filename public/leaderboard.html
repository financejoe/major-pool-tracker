<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PGA Leaderboard" />
<title>PGA Championship Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e0c;
    --surface-2: #141a16;
    --surface-3: #1c2521;
    --border: #2a3530;
    --border-soft: #1f2824;
    --text: #e8e4d8;
    --text-muted: #8a948e;
    --text-faint: #545d57;
    --accent: #c9a45c;
    --under: #6fb583;
    --over: #c97560;
    --even: #b0b8b3;
    --cut: #6a5240;
    --gold: #d4af37;
    --silver: #a8a8a8;
    --bronze: #b87333;
    --shadow: 0 1px 0 rgba(255,255,255,0.03), 0 8px 24px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.45;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse at top, rgba(201, 164, 92, 0.06), transparent 50%),
      radial-gradient(ellipse at bottom, rgba(111, 181, 131, 0.04), transparent 50%);
  }
  .app { max-width: 720px; margin: 0 auto; padding: 18px 16px 32px; }

  .header {
    padding-bottom: 14px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .pool-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 28px;
    line-height: 1.1;
    margin: 0;
    letter-spacing: 0.2px;
  }
  .pool-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .header-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); width: 30px; height: 30px;
    border-radius: 6px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar {
    display: flex; justify-content: space-between;
    font-size: 10.5px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 14px;
  }
  .status-bar .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--under); display: inline-block;
    margin-right: 5px; vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .find-team { margin-bottom: 14px; }
  .find-team-row { position: relative; }
  .find-team-input {
    width: 100%;
    background: var(--surface-3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12.5px;
    padding: 8px 34px 8px 32px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  .find-team-input:focus { border-color: var(--accent); }
  .find-team-input::placeholder { color: var(--text-faint); }
  .find-team-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    display: flex;
    align-items: center;
    pointer-events: none;
  }
  .find-team-clear {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }
  .find-team-clear.visible { display: flex; }
  .find-team-clear:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .find-team-status {
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: none;
  }
  .find-team-status.visible { display: block; }

  .leaderboard {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface-2);
    box-shadow: var(--shadow);
  }
  .lb-head, .lb-row {
    display: grid;
    grid-template-columns: 42px 1fr 44px 44px 50px;
    gap: 8px;
    padding: 9px 14px;
    align-items: center;
  }
  .lb-head {
    font-size: 9.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border-soft);
  }
  .lb-head .num, .lb-row .num { text-align: right; font-variant-numeric: tabular-nums; }
  .lb-row {
    border-bottom: 1px solid var(--border-soft);
    transition: background 0.12s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(255,255,255,0.02); }

  .lb-pos {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .lb-row.rank-1 .lb-pos { color: var(--gold); font-weight: 600; }
  .lb-row.rank-2 .lb-pos { color: var(--silver); font-weight: 600; }
  .lb-row.rank-3 .lb-pos { color: var(--bronze); font-weight: 600; }

  .lb-player {
    font-size: 13.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .lb-flag {
    width: 16px;
    height: 11px;
    object-fit: cover;
    border-radius: 1px;
    opacity: 0.85;
    flex-shrink: 0;
  }
  .lb-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .lb-today {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .lb-thru {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .lb-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .lb-row.is-out { opacity: 0.55; }
  .lb-row.is-out .lb-total { color: var(--cut); font-size: 12px; }

  .s-under { color: var(--under); }
  .s-over { color: var(--over); }
  .s-even { color: var(--even); }
  .s-cut { color: var(--cut); font-size: 11px; }

  .lb-row.filter-dim { opacity: 0.22; }
  .lb-row.is-out.filter-dim { opacity: 0.10; }
  .lb-row.filter-match { position: relative; }
  .lb-row.filter-match::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .section-divider {
    padding: 14px 14px 6px;
    font-size: 9.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    background: rgba(0,0,0,0.15);
    border-top: 1px solid var(--border-soft);
    border-bottom: 1px solid var(--border-soft);
  }

  .loading, .error {
    padding: 40px 20px; text-align: center;
    color: var(--text-muted); font-size: 12px;
  }
  .error { color: var(--over); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1 class="pool-title">PGA Championship Leaderboard</h1>
      <div class="pool-meta" id="lb-meta">Loading tournament…</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refresh-btn" title="Refresh now">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
      </button>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="dot"></span><span>Live</span></span>
    <span id="last-updated">—</span>
  </div>

  <div class="find-team">
    <div class="find-team-row">
      <span class="find-team-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input type="text" class="find-team-input" id="find-team-input" placeholder="Find a player…" autocomplete="off" spellcheck="false" />
      <button class="find-team-clear" id="find-team-clear" aria-label="Clear search">×</button>
    </div>
    <div class="find-team-status" id="find-team-status"></div>
  </div>

  <div class="leaderboard" id="leaderboard">
    <div class="loading">Loading…</div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard';
  const REFRESH_SECONDS = 180;
  const SEARCH_KEY = 'tournamentLeaderboard:findPlayer';

  let tournament = null;
  let competitors = [];
  let lastFetch = null;
  let searchQuery = '';
  let initialFilterApplied = false;

  function normalizeName(s) {
    return String(s || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/ø/g, 'o').replace(/æ/g, 'ae').replace(/ß/g, 'ss').replace(/ł/g, 'l')
      .replace(/[.']/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function fmtScore(toPar) {
    if (toPar === null || toPar === undefined) return '—';
    if (toPar === 0) return 'E';
    return (toPar > 0 ? '+' : '') + toPar;
  }
  function scoreClass(toPar) {
    if (toPar === null || toPar === undefined) return '';
    if (toPar < 0) return 's-under';
    if (toPar > 0) return 's-over';
    return 's-even';
  }
  function todayClass(d) {
    if (!d) return '';
    if (d === 'E' || d === '0') return 's-even';
    if (typeof d !== 'string') return '';
    if (d.startsWith('-')) return 's-under';
    if (d.startsWith('+')) return 's-over';
    return '';
  }
  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  async function fetchScoreboard() {
    setSpinning(true);
    try {
      const r = await fetch(ESPN_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const json = await r.json();
      processData(json);
      lastFetch = Date.now();
      render();
    } catch (e) {
      console.error(e);
      document.getElementById('leaderboard').innerHTML =
        '<div class="error">Could not reach ESPN. Will retry on next refresh.<br><span style="color:var(--text-faint);font-size:10.5px">' +
        (e.message || '') + '</span></div>';
    } finally {
      setSpinning(false);
      updateTimestamp();
    }
  }

  function processData(json) {
    const event = json.events && json.events[0];
    if (!event) { tournament = null; competitors = []; return; }
    tournament = {
      id: event.id,
      name: event.name,
      status: (event.status && event.status.type && event.status.type.description) || ''
    };
    const comp = (event.competitions || [])[0];
    const raw = (comp && comp.competitors) || [];

    const list = [];
    raw.forEach(c => {
      const athlete = c.athlete || {};
      const scoreStr = (c.score || '').toString();
      const status = c.status || {};
      const statusName = ((status.type && status.type.description) || '').toLowerCase();
      const isCut = /cut|missed/.test(statusName) || /CUT|MC/i.test(scoreStr);
      const isWD = /withdraw|wd/i.test(statusName) || /WD/i.test(scoreStr);
      const isDQ = /disqualif|dq/i.test(statusName) || /DQ/i.test(scoreStr);
      const isOut = isCut || isWD || isDQ;

      let toPar = null;
      if (scoreStr === 'E' || scoreStr === '') toPar = 0;
      else {
        const m = scoreStr.match(/^([+-]?)(\d+)$/);
        if (m) toPar = (m[1] === '-' ? -1 : 1) * parseInt(m[2], 10);
        else if (isOut) toPar = 0;
      }

      const lines = Array.isArray(c.linescores) ? c.linescores : [];
      const rounds = [];
      for (let r = 1; r <= 4; r++) {
        const ln = lines.find(x => x && x.period === r);
        if (ln && ln.linescores && ln.linescores.length) {
          rounds.push({
            strokes: typeof ln.value === 'number' ? ln.value : 0,
            holesPlayed: ln.linescores.length,
            displayValue: ln.displayValue || null
          });
        } else {
          rounds.push({ strokes: 0, holesPlayed: 0, displayValue: null });
        }
      }
      const hasStarted = rounds.some(r => r.holesPlayed > 0);

      let currentRound = null, thru = null, teeTime = null, todayScore = null;
      for (let i = lines.length - 1; i >= 0; i--) {
        const ln = lines[i];
        if (ln && ln.displayValue && ln.linescores && ln.linescores.length) {
          currentRound = ln; break;
        }
      }
      if (currentRound) {
        todayScore = currentRound.displayValue;
        const holes = currentRound.linescores || [];
        thru = holes.length === 18 ? 'F' : String(holes.length);
        try {
          const stats = currentRound.statistics && currentRound.statistics.categories;
          if (stats && stats[0] && stats[0].stats) {
            const last = stats[0].stats[stats[0].stats.length - 1];
            if (last && typeof last.displayValue === 'string' && /\d:\d\d/.test(last.displayValue)) {
              teeTime = last.displayValue;
            }
          }
        } catch (_) {}
      } else if (!isOut) {
        // Hasn't teed off yet — try to surface tee time from the round-1 statistics
        const ln = lines.find(x => x && x.period === 1);
        try {
          const stats = ln && ln.statistics && ln.statistics.categories;
          if (stats && stats[0] && stats[0].stats) {
            const last = stats[0].stats[stats[0].stats.length - 1];
            if (last && typeof last.displayValue === 'string' && /\d:\d\d/.test(last.displayValue)) {
              teeTime = last.displayValue;
            }
          }
        } catch (_) {}
      }

      list.push({
        id: athlete.id || c.id,
        name: athlete.displayName || athlete.fullName || 'Unknown',
        flagHref: (athlete.flag && athlete.flag.href) || null,
        flagAlt: (athlete.flag && athlete.flag.alt) || '',
        toPar,
        isOut,
        outLabel: isCut ? 'MC' : (isWD ? 'WD' : (isDQ ? 'DQ' : null)),
        hasStarted,
        todayScore,
        thru,
        teeTime
      });
    });

    competitors = list;
  }

  function render() {
    if (!tournament) {
      document.getElementById('lb-meta').textContent = 'No active event';
      document.getElementById('leaderboard').innerHTML = '';
      return;
    }
    const metaParts = [tournament.name];
    if (tournament.status) metaParts.push(tournament.status);
    document.getElementById('lb-meta').textContent = metaParts.join(' · ');

    const active = competitors.filter(p => !p.isOut).slice();
    const out = competitors.filter(p => p.isOut).slice();

    // Sort active: started players ranked by to-par; not-started at bottom, alpha
    active.sort((a, b) => {
      if (a.hasStarted && !b.hasStarted) return -1;
      if (!a.hasStarted && b.hasStarted) return 1;
      if (!a.hasStarted && !b.hasStarted) return a.name.localeCompare(b.name);
      // both started
      if (a.toPar === null && b.toPar === null) return 0;
      if (a.toPar === null) return 1;
      if (b.toPar === null) return -1;
      if (a.toPar !== b.toPar) return a.toPar - b.toPar;
      return a.name.localeCompare(b.name);
    });

    // Sort out alphabetically
    out.sort((a, b) => a.name.localeCompare(b.name));

    // Compute tournament positions for active (started only)
    let pos = 0, lastScore = null, tieGroup = [];
    function flushTie() {
      if (!tieGroup.length) return;
      const startPos = pos - tieGroup.length + 1;
      const label = (tieGroup.length > 1 ? 'T' : '') + startPos;
      tieGroup.forEach(p => { p.positionLabel = label; p.rankInt = startPos; });
      tieGroup = [];
    }
    active.forEach(p => {
      if (!p.hasStarted) { p.positionLabel = '—'; p.rankInt = null; return; }
      if (lastScore !== null && p.toPar !== lastScore) flushTie();
      pos += 1;
      lastScore = p.toPar;
      tieGroup.push(p);
    });
    flushTie();

    out.forEach(p => { p.positionLabel = p.outLabel || 'OUT'; p.rankInt = null; });

    const board = document.getElementById('leaderboard');
    board.innerHTML = '';

    const head = document.createElement('div');
    head.className = 'lb-head';
    head.innerHTML = `<span>Pos</span><span>Player</span><span class="num">Today</span><span class="num">Thru</span><span class="num">Total</span>`;
    board.appendChild(head);

    active.forEach(p => board.appendChild(renderRow(p)));

    if (out.length) {
      const divider = document.createElement('div');
      divider.className = 'section-divider';
      const labels = [];
      const mcCount = out.filter(p => p.outLabel === 'MC').length;
      const wdCount = out.filter(p => p.outLabel === 'WD').length;
      const dqCount = out.filter(p => p.outLabel === 'DQ').length;
      if (mcCount) labels.push(`${mcCount} missed cut`);
      if (wdCount) labels.push(`${wdCount} withdrew`);
      if (dqCount) labels.push(`${dqCount} disqualified`);
      divider.textContent = labels.length ? `Out · ${labels.join(', ')}` : 'Out';
      board.appendChild(divider);
      out.forEach(p => board.appendChild(renderRow(p)));
    }

    applySearch(!initialFilterApplied);
    initialFilterApplied = true;
  }

  function renderRow(p) {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.dataset.playerName = p.name;
    if (p.isOut) row.classList.add('is-out');
    if (p.rankInt === 1) row.classList.add('rank-1');
    else if (p.rankInt === 2) row.classList.add('rank-2');
    else if (p.rankInt === 3) row.classList.add('rank-3');

    const flagHtml = p.flagHref
      ? `<img class="lb-flag" src="${escapeHtml(p.flagHref)}" alt="${escapeHtml(p.flagAlt)}" loading="lazy" />`
      : '<span class="lb-flag"></span>';
    const todayHtml = p.isOut
      ? '<span style="color:var(--text-faint)">—</span>'
      : (p.todayScore
          ? `<span class="${todayClass(p.todayScore)}">${escapeHtml(p.todayScore)}</span>`
          : '<span style="color:var(--text-faint)">—</span>');
    const thruHtml = p.isOut
      ? '—'
      : (p.thru || p.teeTime || '—');
    let totalHtml;
    if (p.isOut) {
      totalHtml = `<span class="s-cut">${escapeHtml(p.outLabel || 'OUT')}${p.toPar !== null ? ' ' + fmtScore(p.toPar) : ''}</span>`;
    } else if (!p.hasStarted) {
      totalHtml = '<span style="color:var(--text-faint)">—</span>';
    } else {
      totalHtml = `<span class="${scoreClass(p.toPar)}">${fmtScore(p.toPar)}</span>`;
    }

    row.innerHTML = `
      <span class="lb-pos">${p.positionLabel}</span>
      <span class="lb-player">${flagHtml}<span class="lb-name">${escapeHtml(p.name)}</span></span>
      <span class="lb-today num">${todayHtml}</span>
      <span class="lb-thru num">${escapeHtml(thruHtml)}</span>
      <span class="lb-total num">${totalHtml}</span>
    `;
    return row;
  }

  function applySearch(scrollToMatch) {
    const query = normalizeName(searchQuery);
    const rows = document.querySelectorAll('.lb-row');
    const clearBtn = document.getElementById('find-team-clear');
    const statusEl = document.getElementById('find-team-status');

    if (!query) {
      rows.forEach(r => r.classList.remove('filter-dim', 'filter-match'));
      clearBtn.classList.remove('visible');
      statusEl.classList.remove('visible');
      return;
    }

    clearBtn.classList.add('visible');

    const matches = [];
    rows.forEach(row => {
      const name = row.dataset.playerName || '';
      if (normalizeName(name).includes(query)) {
        row.classList.add('filter-match');
        row.classList.remove('filter-dim');
        matches.push(row);
      } else {
        row.classList.remove('filter-match');
        row.classList.add('filter-dim');
      }
    });

    if (matches.length === 0) {
      rows.forEach(r => r.classList.remove('filter-dim'));
      statusEl.textContent = 'No matches';
      statusEl.classList.add('visible');
    } else {
      statusEl.textContent = matches.length === 1 ? '1 match' : `${matches.length} matches`;
      statusEl.classList.add('visible');
      if (scrollToMatch) {
        matches[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }

  function updateTimestamp() {
    const el = document.getElementById('last-updated');
    if (!lastFetch) { el.textContent = '—'; return; }
    const d = new Date(lastFetch);
    el.textContent = 'Updated ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function setSpinning(loading) {
    const btn = document.getElementById('refresh-btn');
    if (loading) btn.classList.add('spinning'); else btn.classList.remove('spinning');
  }

  document.getElementById('refresh-btn').addEventListener('click', fetchScoreboard);

  const findInput = document.getElementById('find-team-input');
  const findClear = document.getElementById('find-team-clear');

  findInput.addEventListener('input', e => {
    searchQuery = e.target.value;
    try {
      if (searchQuery) localStorage.setItem(SEARCH_KEY, searchQuery);
      else localStorage.removeItem(SEARCH_KEY);
    } catch (_) {}
    applySearch(true);
  });
  findInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      searchQuery = '';
      findInput.value = '';
      try { localStorage.removeItem(SEARCH_KEY); } catch (_) {}
      applySearch(false);
    }
  });
  findClear.addEventListener('click', () => {
    searchQuery = '';
    findInput.value = '';
    try { localStorage.removeItem(SEARCH_KEY); } catch (_) {}
    applySearch(false);
    findInput.focus();
  });

  try {
    const saved = localStorage.getItem(SEARCH_KEY);
    if (saved) { searchQuery = saved; findInput.value = saved; }
  } catch (_) {}

  fetchScoreboard();
  setInterval(fetchScoreboard, REFRESH_SECONDS * 1000);
})();
</script>
</body>
</html>
